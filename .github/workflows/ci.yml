name: Quality Gate

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, test, and release check
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        # actions/dependency-review-action@v5.0.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate
          fail-on-scopes: "runtime,development,unknown"
          comment-summary-in-pr: never
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 3

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          fi
          xcodebuild -version
          xcodebuild -showsdks

      - name: Repository quality checks
        run: scripts/check-repository-quality.sh

      - name: Test with strict warnings and coverage
        run: |
          set -o pipefail

          xcodebuild test \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/MacDragScrollDerivedData" \
            -resultBundlePath "$RUNNER_TEMP/MacDragScrollTests.xcresult" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

          xcrun xccov view --report "$RUNNER_TEMP/MacDragScrollTests.xcresult" | sed -n '1,3p'

      - name: Guard Malloc fuzz stress test
        run: scripts/check-fuzz-harnesses.sh

      - name: Static analysis
        run: |
          xcodebuild analyze \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/MacDragScrollAnalyzeDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Universal release build
        run: |
          xcodebuild build \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/MacDragScrollReleaseDerivedData" \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: macOS compatibility checks
        run: |
          scripts/check-macos-compatibility.sh \
            "$RUNNER_TEMP/MacDragScrollReleaseDerivedData/Build/Products/Release/Mac Drag Scroll.app"

      - name: Release metadata checks
        run: |
          version="$(xcodebuild -showBuildSettings -project macdragscroll.xcodeproj -scheme macdragscroll -configuration Release | awk -F'= ' '/MARKETING_VERSION =/ { print $2; exit }')"
          bash -n scripts/*.sh
          scripts/extract-release-notes.sh "$version" >/dev/null
          scripts/validate-homebrew-cask.sh

name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "18 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Swift SAST
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          fi
          xcodebuild -version

      - name: Initialize CodeQL
        # github/codeql-action/init@v4
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc
        with:
          languages: swift
          queries: security-extended

      - name: Build for analysis
        run: |
          xcodebuild build \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/MacDragScrollCodeQLDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v4
        uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc

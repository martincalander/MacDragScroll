name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix, for example 1.0.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  APP_NAME: "Mac Drag Scroll"
  APP_BUNDLE: "Mac Drag Scroll.app"
  APP_ZIP: "MacDragScroll.zip"
  APP_DMG: "MacDragScroll.dmg"
  BUNDLE_ID: "com.martincalander.macdragscroll"
  SPARKLE_VERSION: "2.9.4"

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          fi
          xcodebuild -version

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${INPUT_VERSION}"
            tag="v${version}"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use SemVer, for example 1.0.0. Got: $version" >&2
            exit 64
          fi

          settings="$(xcodebuild -showBuildSettings -project macdragscroll.xcodeproj -scheme macdragscroll -configuration Release)"
          marketing_version="$(awk -F'= ' '/MARKETING_VERSION =/ { print $2; exit }' <<< "$settings")"
          build_number="$(awk -F'= ' '/CURRENT_PROJECT_VERSION =/ { print $2; exit }' <<< "$settings")"

          if [ "$marketing_version" != "$version" ]; then
            echo "Tag $tag does not match MARKETING_VERSION $marketing_version" >&2
            exit 65
          fi

          ./scripts/extract-release-notes.sh "$version" > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "Release notes for $version are empty" >&2
            exit 66
          fi

          {
            echo "RELEASE_VERSION=$version"
            echo "RELEASE_TAG=$tag"
            echo "BUILD_NUMBER=$build_number"
            echo "RELEASE_NOTES=$RUNNER_TEMP/release-notes.md"
          } >> "$GITHUB_ENV"

      - name: Verify release secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for secret in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID MACOS_CERTIFICATE_P12 MACOS_CERTIFICATE_PASSWORD SPARKLE_PRIVATE_KEY; do
            if [ -z "${!secret}" ]; then
              missing+=("$secret")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release secrets:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 67
          fi

      - name: Test
        run: |
          xcodebuild test \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/MacDragScrollTestDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$MACOS_CERTIFICATE_P12" ] || [ -z "$MACOS_CERTIFICATE_PASSWORD" ]; then
            echo "Missing MACOS_CERTIFICATE_P12 or MACOS_CERTIFICATE_PASSWORD secret" >&2
            exit 67
          fi

          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "$MACOS_CERTIFICATE_P12" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" login.keychain-db

      - name: Archive and export Developer ID app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "Missing APPLE_TEAM_ID secret" >&2
            exit 67
          fi

          archive_path="$RUNNER_TEMP/MacDragScroll.xcarchive"
          export_path="$RUNNER_TEMP/export"
          export_options="$RUNNER_TEMP/ExportOptions.plist"

          plutil -create xml1 "$export_options"
          plutil -insert method -string developer-id "$export_options"
          plutil -insert signingStyle -string manual "$export_options"
          plutil -insert teamID -string "$APPLE_TEAM_ID" "$export_options"
          plutil -insert stripSwiftSymbols -bool true "$export_options"
          plutil -lint "$export_options"

          xcodebuild archive \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -configuration Release \
            -archivePath "$archive_path" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

          xcodebuild -exportArchive \
            -archivePath "$archive_path" \
            -exportPath "$export_path" \
            -exportOptionsPlist "$export_options"

          app_path="$export_path/$APP_BUNDLE"
          if [ ! -d "$app_path" ]; then
            echo "Exported app not found at $app_path" >&2
            exit 66
          fi

          actual_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_path/Contents/Info.plist")"
          actual_build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_path/Contents/Info.plist")"
          if [ "$actual_version" != "$RELEASE_VERSION" ] || [ "$actual_build" != "$BUILD_NUMBER" ]; then
            echo "Exported app version/build mismatch: $actual_version ($actual_build)" >&2
            exit 65
          fi

          echo "APP_PATH=$app_path" >> "$GITHUB_ENV"

      - name: Notarize and package app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          for secret in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!secret}" ]; then
              echo "Missing $secret secret" >&2
              exit 67
            fi
          done

          artifacts="$RUNNER_TEMP/release-artifacts"
          dmg_root="$RUNNER_TEMP/dmg-root"
          unsigned_zip="$RUNNER_TEMP/notary-upload.zip"
          mkdir -p "$artifacts" "$dmg_root"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$unsigned_zip"
          xcrun notarytool submit "$unsigned_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$artifacts/$APP_ZIP"

          ditto "$APP_PATH" "$dmg_root/$APP_BUNDLE"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$dmg_root" \
            -fs APFS \
            -format UDZO \
            "$artifacts/$APP_DMG"

          codesign --force --sign "Developer ID Application" --timestamp "$artifacts/$APP_DMG"
          xcrun notarytool submit "$artifacts/$APP_DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$artifacts/$APP_DMG"
          spctl --assess --type open --context context:primary-signature --verbose "$artifacts/$APP_DMG"

          {
            echo "ARTIFACTS_DIR=$artifacts"
            echo "ZIP_PATH=$artifacts/$APP_ZIP"
            echo "DMG_PATH=$artifacts/$APP_DMG"
          } >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret" >&2
            exit 67
          fi

          sparkle_archive="$RUNNER_TEMP/Sparkle-${SPARKLE_VERSION}.tar.xz"
          sparkle_tools="$RUNNER_TEMP/sparkle-tools"
          appcast_source="$RUNNER_TEMP/appcast-source"
          sparkle_key="$RUNNER_TEMP/sparkle_private_key"

          curl --fail --location \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            --output "$sparkle_archive"
          mkdir -p "$sparkle_tools" "$appcast_source"
          tar -xf "$sparkle_archive" -C "$sparkle_tools"

          printf "%s" "$SPARKLE_PRIVATE_KEY" > "$sparkle_key"
          chmod 600 "$sparkle_key"

          cp "$ZIP_PATH" "$appcast_source/$APP_ZIP"
          cp "$RELEASE_NOTES" "$appcast_source/MacDragScroll.md"

          "$sparkle_tools/bin/generate_appcast" \
            --ed-key-file "$sparkle_key" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" \
            --embed-release-notes \
            -o "$ARTIFACTS_DIR/appcast.xml" \
            "$appcast_source"

          (
            cd "$ARTIFACTS_DIR"
            shasum -a 256 "$APP_ZIP" "$APP_DMG" appcast.xml > SHA256SUMS.txt
          )

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="Mac Drag Scroll ${RELEASE_VERSION}"
          assets=(
            "$ARTIFACTS_DIR/$APP_ZIP"
            "$ARTIFACTS_DIR/$APP_DMG"
            "$ARTIFACTS_DIR/appcast.xml"
            "$ARTIFACTS_DIR/SHA256SUMS.txt"
          )

          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$GITHUB_SHA" \
              >/dev/null
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$title" --notes-file "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --target "$GITHUB_SHA" --title "$title" --notes-file "$RELEASE_NOTES"
          fi

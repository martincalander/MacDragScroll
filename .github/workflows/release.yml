name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release tag version without v prefix, for example 1.0.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: read-all

env:
  APP_NAME: "Mac Drag Scroll"
  APP_BUNDLE: "Mac Drag Scroll.app"
  APP_ZIP: "MacDragScroll.zip"
  APP_DMG: "MacDragScroll.dmg"
  SIGNATURE_FILE: "MacDragScroll.zip.sig"
  PROVENANCE_FILE: "MacDragScroll.intoto.jsonl"
  BUNDLE_ID: "com.martincalander.macdragscroll"
  SIGNING_IDENTITY_NAME: "Mac Drag Scroll Release Signing"
  SPARKLE_VERSION: "2.9.4"
  SPARKLE_ARCHIVE_SHA256: "ce89daf967db1e1893ed3ebd67575ed82d3902563e3191ca92aaec9164fbdef9"

jobs:
  release:
    name: Build and publish release
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app
          fi
          xcodebuild -version

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${INPUT_VERSION}"
            tag="v${version}"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use SemVer, for example 1.0.0. Got: $version" >&2
            exit 64
          fi

          settings="$(xcodebuild -showBuildSettings -project macdragscroll.xcodeproj -scheme macdragscroll -configuration Release)"
          marketing_version="$(awk -F'= ' '/MARKETING_VERSION =/ { print $2; exit }' <<< "$settings")"
          build_number="$(awk -F'= ' '/CURRENT_PROJECT_VERSION =/ { print $2; exit }' <<< "$settings")"

          if [ "$marketing_version" != "$version" ]; then
            echo "Tag $tag does not match MARKETING_VERSION $marketing_version" >&2
            exit 65
          fi

          ./scripts/extract-release-notes.sh "$version" > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "Release notes for $version are empty" >&2
            exit 66
          fi

          {
            echo "RELEASE_VERSION=$version"
            echo "RELEASE_TAG=$tag"
            echo "BUILD_NUMBER=$build_number"
            echo "RELEASE_NOTES=$RUNNER_TEMP/release-notes.md"
          } >> "$GITHUB_ENV"

      - name: Verify release secrets
        env:
          MACOS_RELEASE_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_RELEASE_CERTIFICATE_P12_BASE64 }}
          MACOS_RELEASE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_RELEASE_CERTIFICATE_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for secret in MACOS_RELEASE_CERTIFICATE_P12_BASE64 MACOS_RELEASE_CERTIFICATE_PASSWORD SPARKLE_PRIVATE_KEY; do
            if [ -z "${!secret}" ]; then
              missing+=("$secret")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release secrets:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 67
          fi

      - name: Test
        run: |
          xcodebuild test \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/MacDragScrollTestDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Build release app
        run: |
          set -euo pipefail

          derived_data="$RUNNER_TEMP/MacDragScrollReleaseDerivedData"

          xcodebuild build \
            -project macdragscroll.xcodeproj \
            -scheme macdragscroll \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$derived_data" \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

          app_path="$derived_data/Build/Products/Release/$APP_BUNDLE"
          if [ ! -d "$app_path" ]; then
            echo "Built app not found at $app_path" >&2
            exit 66
          fi

          scripts/check-macos-compatibility.sh "$app_path"

          actual_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app_path/Contents/Info.plist")"
          actual_build="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app_path/Contents/Info.plist")"
          if [ "$actual_version" != "$RELEASE_VERSION" ] || [ "$actual_build" != "$BUILD_NUMBER" ]; then
            echo "Built app version/build mismatch: $actual_version ($actual_build)" >&2
            exit 65
          fi

          echo "APP_PATH=$app_path" >> "$GITHUB_ENV"

      - name: Import stable release identity
        env:
          SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_RELEASE_CERTIFICATE_P12_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_RELEASE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          p12_path="$RUNNER_TEMP/mac-drag-scroll-release-signing.p12"
          certificate_path="$RUNNER_TEMP/mac-drag-scroll-release-signing.pem"
          keychain_path="$RUNNER_TEMP/mac-drag-scroll-release.keychain-db"
          keychain_password="$(openssl rand -hex 32)"

          cleanup_failed_import() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              sudo security remove-trusted-cert -d "$certificate_path" >/dev/null 2>&1 || true
              security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
              rm -f "$p12_path" "$certificate_path"
            fi
            exit "$status"
          }
          trap cleanup_failed_import EXIT

          printf '%s' "$SIGNING_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$p12_path"
          chmod 600 "$p12_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"

          default_keychain="$(security default-keychain -d user | sed -E 's/^[[:space:]]*\"//; s/\"[[:space:]]*$//')"
          security list-keychains -d user -s "$keychain_path" "$default_keychain"
          security import "$p12_path" \
            -k "$keychain_path" \
            -P "$SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign >/dev/null
          security find-certificate -c "$SIGNING_IDENTITY_NAME" -p "$keychain_path" > "$certificate_path"
          sudo security add-trusted-cert -d -r trustRoot "$certificate_path"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path" >/dev/null

          identity_hash="$(security find-identity -v -p codesigning "$keychain_path" | awk 'NR == 1 { print $2 }')"
          expected_hash="$(tr -d '[:space:]' < scripts/release-signing-cert.sha1 | tr '[:lower:]' '[:upper:]')"
          if [ -z "$identity_hash" ] || [ "$identity_hash" != "$expected_hash" ]; then
            echo "Imported release identity does not match the pinned certificate fingerprint." >&2
            exit 65
          fi

          {
            echo "SIGNING_IDENTITY_HASH=$identity_hash"
            echo "SIGNING_KEYCHAIN=$keychain_path"
            echo "SIGNING_P12_PATH=$p12_path"
            echo "SIGNING_CERTIFICATE_PATH=$certificate_path"
          } >> "$GITHUB_ENV"
          trap - EXIT

      - name: Apply and verify stable release signature
        run: |
          scripts/sign-release-app.sh "$APP_PATH" "$SIGNING_IDENTITY_HASH" "$SIGNING_KEYCHAIN"

      - name: Remove release signing material from runner
        if: always()
        run: |
          if [ -s "${SIGNING_CERTIFICATE_PATH:-}" ]; then
            sudo security remove-trusted-cert -d "$SIGNING_CERTIFICATE_PATH" >/dev/null 2>&1 || true
          fi
          if [ -n "${SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$SIGNING_KEYCHAIN" >/dev/null 2>&1 || true
          fi
          rm -f "${SIGNING_P12_PATH:-}" "${SIGNING_CERTIFICATE_PATH:-}"

      - name: Package app
        run: |
          set -euo pipefail

          artifacts=".build/release-artifacts"
          dmg_root="$RUNNER_TEMP/dmg-root"
          rm -rf "$artifacts"
          mkdir -p "$artifacts" "$dmg_root"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$artifacts/$APP_ZIP"

          ditto "$APP_PATH" "$dmg_root/$APP_BUNDLE"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$dmg_root" \
            -fs APFS \
            -format UDZO \
            "$artifacts/$APP_DMG"

          {
            echo "ARTIFACTS_DIR=$artifacts"
            echo "ZIP_PATH=$artifacts/$APP_ZIP"
            echo "DMG_PATH=$artifacts/$APP_DMG"
          } >> "$GITHUB_ENV"

      - name: Verify packaged app identity
        run: |
          set -euo pipefail

          zip_root="$RUNNER_TEMP/verify-zip"
          mount_point="$RUNNER_TEMP/verify-dmg"
          mkdir -p "$zip_root" "$mount_point"

          ditto -x -k "$ZIP_PATH" "$zip_root"
          scripts/verify-release-signature.sh "$zip_root/$APP_BUNDLE"

          cleanup_mount() {
            hdiutil detach "$mount_point" >/dev/null 2>&1 || true
          }
          trap cleanup_mount EXIT
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_point" "$DMG_PATH" >/dev/null
          scripts/verify-release-signature.sh "$mount_point/$APP_BUNDLE"
          cleanup_mount
          trap - EXIT

      - name: Download verified Sparkle tools
        run: |
          set -euo pipefail

          sparkle_archive="$RUNNER_TEMP/Sparkle-${SPARKLE_VERSION}.tar.xz"
          sparkle_tools="$RUNNER_TEMP/sparkle-tools"

          curl --fail --location \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            --output "$sparkle_archive"

          actual_checksum="$(shasum -a 256 "$sparkle_archive" | awk '{ print $1 }')"
          if [ "$actual_checksum" != "$SPARKLE_ARCHIVE_SHA256" ]; then
            echo "Sparkle tools checksum mismatch" >&2
            echo "Expected: $SPARKLE_ARCHIVE_SHA256" >&2
            echo "Actual:   $actual_checksum" >&2
            exit 66
          fi

          mkdir -p "$sparkle_tools"
          tar -xf "$sparkle_archive" -C "$sparkle_tools"

          echo "SPARKLE_TOOLS=$sparkle_tools" >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY secret" >&2
            exit 67
          fi

          appcast_source="$RUNNER_TEMP/appcast-source"
          sparkle_key="$RUNNER_TEMP/sparkle_private_key"
          mkdir -p "$appcast_source"

          printf "%s" "$SPARKLE_PRIVATE_KEY" > "$sparkle_key"
          chmod 600 "$sparkle_key"

          cp "$ZIP_PATH" "$appcast_source/$APP_ZIP"
          cp "$RELEASE_NOTES" "$appcast_source/MacDragScroll.md"

          "$SPARKLE_TOOLS/bin/generate_appcast" \
            --ed-key-file "$sparkle_key" \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" \
            --embed-release-notes \
            -o "$ARTIFACTS_DIR/appcast.xml" \
            "$appcast_source"

          signature="$("$SPARKLE_TOOLS/bin/sign_update" --ed-key-file "$sparkle_key" -p "$ZIP_PATH")"
          appcast_signature="$(xmllint --xpath 'string(//*[local-name()="enclosure"]/@*[local-name()="edSignature"])' "$ARTIFACTS_DIR/appcast.xml")"
          if [ -z "$signature" ] || [ "$signature" != "$appcast_signature" ]; then
            echo "Detached Sparkle signature does not match appcast.xml" >&2
            exit 65
          fi
          printf '%s\n' "$signature" > "$ARTIFACTS_DIR/$SIGNATURE_FILE"

          (
            cd "$ARTIFACTS_DIR"
            shasum -a 256 "$APP_ZIP" "$APP_DMG" appcast.xml "$SIGNATURE_FILE" > SHA256SUMS.txt
          )

      - name: Attest release artifacts
        id: attest_release
        # actions/attest-build-provenance@v4.1.1
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            ${{ env.ZIP_PATH }}
            ${{ env.DMG_PATH }}
            ${{ env.ARTIFACTS_DIR }}/appcast.xml
            ${{ env.ARTIFACTS_DIR }}/${{ env.SIGNATURE_FILE }}
            ${{ env.ARTIFACTS_DIR }}/SHA256SUMS.txt

      - name: Export release provenance
        env:
          BUNDLE_PATH: ${{ steps.attest_release.outputs.bundle-path }}
        run: |
          set -euo pipefail

          if [ -z "$BUNDLE_PATH" ] || [ ! -s "$BUNDLE_PATH" ]; then
            echo "GitHub did not produce an attestation bundle" >&2
            exit 66
          fi
          cp "$BUNDLE_PATH" "$ARTIFACTS_DIR/$PROVENANCE_FILE"

      - name: Verify release tag
        run: |
          set -euo pipefail

          tagged_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          checkout_commit="$(git rev-parse HEAD)"
          if [ "$tagged_commit" != "$checkout_commit" ]; then
            echo "$RELEASE_TAG points to $tagged_commit, but checkout is $checkout_commit" >&2
            exit 65
          fi

      - name: Set up Go for GoReleaser
        # actions/setup-go@v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25.5"
          cache: false

      - name: Publish GitHub release with GoReleaser
        # goreleaser/goreleaser-action@v7.2.3
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --release-notes=${{ env.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
